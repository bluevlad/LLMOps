# LLMOps — production / staging compose
# 공유 PostgreSQL(database-services/docker-compose.yml의 'postgresql' 컨테이너)에 연결.
# 네트워크: 'database-network' (postgresql/pgadmin/mongodb와 같은 네트워크)
# DATABASE_URL은 .env에서 주입 (호스트는 'postgresql' 컨테이너명).

services:
  llmops-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: llmops-backend:latest
    container_name: llmops-backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      # MLX 스캐너가 컨테이너 안에서 호스트 디렉토리 그대로 읽도록 동일 경로 마운트.
      # .env 의 MLX_MODEL_DIR 와 일치해야 함.
      MLX_MODEL_DIR: /host/.cache/huggingface/hub
    ports:
      - "9110:9110"
    extra_hosts:
      # Ollama 는 호스트(MacBook)에서 실행 → host.docker.internal 로 접근
      - "host.docker.internal:host-gateway"
    volumes:
      # MLX 모델 디렉토리 read-only 마운트 (스캐너 input)
      - /Users/rainend/.cache/huggingface:/host/.cache/huggingface:ro
    networks:
      - database-network

  llmops-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: llmops-frontend:latest
    container_name: llmops-frontend
    restart: unless-stopped
    depends_on:
      - llmops-backend
    ports:
      - "4110:4110"
    networks:
      - database-network

networks:
  database-network:
    external: true
